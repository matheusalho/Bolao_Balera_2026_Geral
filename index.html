    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .modal-bg { animation: bgFadeIn 0.2s ease-out; }
        @keyframes bgFadeIn { from { background-color: transparent; } to { background-color: rgba(0,0,0,0.5); } }
        
        /* Cores Customizadas Balera */
        .text-balera-blue { color: #003366; }
        .bg-balera-blue { background-color: #003366; }
        .border-balera-blue { border-color: #003366; }
        .ring-balera-blue { --tw-ring-color: #003366; }

        /* ===== Otimizacoes de responsividade (mobile) =====
           Obs: o Tailwind embutido e pre-compilado/purgado, entao novos
           utilitarios (grid-cols-3, md:flex, sm:hidden) nao existem no CSS.
           A responsividade abaixo e feita com CSS puro para ser robusta. */
        .ranking-scroll { -webkit-overflow-scrolling: touch; }
        .mobile-only { display: block; }

        /* Modo "Ajustar a tela": aplica zoom out (scale) na tabela do ranking
           para exibi-la completa dentro do card, no mobile. */
        .ranking-fit { overflow-x: hidden; }
        .ranking-fit > table { transform: scale(var(--fit-scale, 1)); transform-origin: top left; }

        /* Navegacao por abas: 3 colunas no mobile, em linha no desktop */
        .tab-nav { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); overflow-x: auto; min-width: 0; }
        .tab-nav > button { padding: 0.5rem 0.25rem; font-size: 0.7rem; line-height: 1.15; white-space: normal; text-align: center; }

        @media (max-width: 639px) {
            .ranking-table th, .ranking-table td { padding: 0.5rem !important; }
            .ranking-table { font-size: 0.8rem; }
            .ranking-table td .text-lg { font-size: 0.95rem; }
            /* Cabecalho do ranking pode quebrar em ate 2 linhas: estreita as
               colunas, reduz a largura total e aumenta a escala de ajuste. */
            .ranking-table thead th { white-space: normal; line-height: 1.15; vertical-align: bottom; }
        }
        @media (min-width: 768px) {
            .mobile-only { display: none; }
            .tab-nav { display: flex; }
            .tab-nav > button { padding: 0.5rem 1rem; font-size: 0.875rem; line-height: 1.25rem; white-space: nowrap; }
        }
    </style>
